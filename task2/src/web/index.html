<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CPU Profiling 火焰图</title>
<style>
  :root {
    --bg: #0f1119;
    --surface: #1a1d2e;
    --surface2: #222640;
    --border: #2a2f45;
    --text: #e0e4f0;
    --text2: #9098b8;
    --accent: #6c8cff;
    --accent2: #4ec9b0;
    --danger: #f44771;
    --warn: #e5a852;
    --radius: 12px;
    --shadow: 0 2px 12px rgba(0,0,0,.3);
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }
  .container { max-width: 1400px; margin: 0 auto; padding: 24px; }

  /* header */
  .header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 24px;
  }
  .header h1 { font-size: 22px; font-weight: 700; letter-spacing: -.3px; }
  .header .badge {
    font-size: 12px; padding: 4px 12px; border-radius: 20px; font-weight: 600;
  }
  .badge-live { background: #1a3a2a; color: #4ec9b0; border: 1px solid #2a5a3a; }
  .badge-off { background: #3a1a1a; color: #f44771; border: 1px solid #5a2a2a; }

  /* cards row */
  .cards {
    display: grid; grid-template-columns: repeat(4, 1fr);
    gap: 16px; margin-bottom: 24px;
  }
  .card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 20px; box-shadow: var(--shadow);
  }
  .card-label { font-size: 12px; color: var(--text2); text-transform: uppercase; letter-spacing: .6px; margin-bottom: 6px; }
  .card-value { font-size: 26px; font-weight: 700; }
  .card-sub { font-size: 12px; color: var(--text2); margin-top: 4px; }

  /* time selector */
  .time-selector {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 20px; margin-bottom: 24px; box-shadow: var(--shadow);
  }
  .time-selector .row { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
  .time-selector label { font-size: 13px; color: var(--text2); }
  .quick-btn {
    padding: 6px 16px; border-radius: 20px; border: 1px solid var(--border);
    background: var(--surface2); color: var(--text); cursor: pointer;
    font-size: 13px; transition: all .2s;
  }
  .quick-btn:hover { border-color: var(--accent); color: var(--accent); }
  .quick-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }
  .time-input {
    padding: 6px 12px; border-radius: 8px; border: 1px solid var(--border);
    background: var(--surface2); color: var(--text); font-size: 13px; outline: none;
  }
  .time-input:focus { border-color: var(--accent); }
  .search-btn {
    padding: 6px 24px; border-radius: 8px; border: none;
    background: var(--accent); color: #fff; font-size: 13px; font-weight: 600; cursor: pointer;
  }
  .search-btn:hover { opacity: .85; }
  .search-btn:disabled { opacity: .4; cursor: not-allowed; }

  /* two-panel layout */
  .panels { display: flex; gap: 24px; min-height: 500px; }
  .panel-left {
    width: 320px; min-width: 320px;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); box-shadow: var(--shadow);
    display: flex; flex-direction: column;
  }
  .panel-right {
    flex: 1; background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); box-shadow: var(--shadow);
    display: flex; align-items: center; justify-content: center; overflow: auto;
  }
  .panel-header {
    padding: 16px 20px; font-size: 14px; font-weight: 600;
    border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center;
  }
  .file-list {
    flex: 1; overflow-y: auto; padding: 8px 0;
    max-height: calc(100vh - 420px); min-height: 200px;
  }
  .file-item {
    padding: 10px 20px; cursor: pointer; font-size: 13px;
    border-bottom: 1px solid rgba(255,255,255,.04); transition: background .15s;
    display: flex; justify-content: space-between; align-items: center;
  }
  .file-item:hover { background: var(--surface2); }
  .file-item.active { background: rgba(108,140,255,.1); border-left: 3px solid var(--accent); }
  .file-name { font-family: "SF Mono", "Fira Code", monospace; font-size: 12px; }
  .file-size { font-size: 11px; color: var(--text2); white-space: nowrap; margin-left: 8px; }

  /* flamegraph area */
  .flame-container { width: 100%; height: 100%; padding: 16px; overflow: auto; }
  .flame-container svg { max-width: 100%; height: auto; }
  .placeholder {
    text-align: center; color: var(--text2); font-size: 15px; line-height: 1.8;
  }
  .placeholder-icon { font-size: 48px; margin-bottom: 12px; opacity: .4; }

  /* loading spinner */
  .spinner {
    display: inline-block; width: 20px; height: 20px;
    border: 2px solid var(--border); border-top-color: var(--accent);
    border-radius: 50%; animation: spin .6s linear infinite; vertical-align: middle;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* toast */
  .toast {
    position: fixed; top: 24px; right: 24px; z-index: 9999;
    padding: 12px 24px; border-radius: 8px; font-size: 13px; font-weight: 600;
    color: #fff; box-shadow: 0 4px 20px rgba(0,0,0,.4);
    animation: slideIn .3s ease;
  }
  .toast-error { background: var(--danger); }
  .toast-info { background: var(--accent); }
  @keyframes slideIn { from { transform: translateX(120%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

  /* responsive */
  @media (max-width: 900px) {
    .cards { grid-template-columns: repeat(2, 1fr); }
    .panels { flex-direction: column; }
    .panel-left { width: 100%; min-width: auto; }
    .file-list { max-height: 250px; }
  }
</style>
</head>
<body>
<div class="container">
  <!-- Header -->
  <div class="header">
    <h1>CPU Profiling 火焰图</h1>
    <span id="collectorBadge" class="badge badge-off">● 采集器离线</span>
  </div>

  <!-- Status Cards -->
  <div class="cards">
    <div class="card">
      <div class="card-label">采集状态</div>
      <div class="card-value" id="statusText">--</div>
      <div class="card-sub" id="statusSub"></div>
    </div>
    <div class="card">
      <div class="card-label">磁盘占用</div>
      <div class="card-value" id="diskUsage">--</div>
      <div class="card-sub" id="svgDiskUsage"></div>
    </div>
    <div class="card">
      <div class="card-label">采样文件数</div>
      <div class="card-value" id="fileCount">--</div>
      <div class="card-sub">perf_*.data</div>
    </div>
    <div class="card">
      <div class="card-label">数据目录</div>
      <div class="card-value" style="font-size:18px;" id="dataDir">--</div>
      <div class="card-sub">perf_raw</div>
    </div>
  </div>

  <!-- Time Selector -->
  <div class="time-selector">
    <div class="row">
      <label>时间范围：</label>
      <button class="quick-btn" data-range="1h">最近 1 小时</button>
      <button class="quick-btn" data-range="6h">最近 6 小时</button>
      <button class="quick-btn active" data-range="24h">最近 24 小时</button>
      <label style="margin-left:16px;">自定义：</label>
      <input class="time-input" type="datetime-local" id="startTime" />
      <span style="color:var(--text2);">—</span>
      <input class="time-input" type="datetime-local" id="endTime" />
      <button class="search-btn" id="searchBtn" onclick="searchFiles()">查询</button>
    </div>
  </div>

  <!-- Two-Panel Layout -->
  <div class="panels">
    <!-- Left: File List -->
    <div class="panel-left">
      <div class="panel-header">
        <span>📂 采样文件</span>
        <span style="font-size:12px;color:var(--text2);" id="fileListCount">0 个</span>
      </div>
      <div class="file-list" id="fileList">
        <div style="padding:40px 20px;text-align:center;color:var(--text2);">
          选择一个时间范围<br>点击「查询」加载文件
        </div>
      </div>
    </div>

    <!-- Right: Flamegraph -->
    <div class="panel-right" id="flamePanel">
      <div class="placeholder">
        <div class="placeholder-icon">🔥</div>
        <div>点击左侧文件列表中的文件</div>
        <div>生成火焰图</div>
      </div>
    </div>
  </div>
</div>

<!-- Toast container -->
<div id="toastContainer"></div>

<script>
// ===================== Config =====================
const API = {
  status: '/api/status',
  files:  '/api/files',
  flame:  '/api/flamegraph',
};

// ===================== Toast =====================
function toast(msg, type = 'info') {
  const el = document.createElement('div');
  el.className = `toast toast-${type}`;
  el.textContent = msg;
  document.getElementById('toastContainer').appendChild(el);
  setTimeout(() => { el.style.opacity = '0'; el.style.transition = 'opacity .3s'; }, 2500);
  setTimeout(() => el.remove(), 2800);
}

// ===================== Format Helpers =====================
function fmtSize(bytes) {
  if (bytes === undefined || bytes === null) return '--';
  if (bytes < 1024) return bytes + ' B';
  if (bytes < 1048576) return (bytes / 1024).toFixed(1) + ' KB';
  return (bytes / 1048576).toFixed(1) + ' MB';
}

function fmtDateTime(iso) {
  if (!iso) return '--';
  return iso.replace('T', ' ').substring(0, 19);
}

// ===================== Time Utils =====================
function toLocalISO(d) {
  const pad = n => String(n).padStart(2, '0');
  return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}T${pad(d.getHours())}:${pad(d.getMinutes())}`;
}

function getRange(hours) {
  const now = new Date();
  const start = new Date(now.getTime() - hours * 3600 * 1000);
  return { start: toLocalISO(start), end: toLocalISO(now) };
}

// ===================== Status =====================
async function loadStatus() {
  try {
    const res = await fetch(API.status);
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();

    const badge = document.getElementById('collectorBadge');
    if (data.collector_running) {
      badge.className = 'badge badge-live';
      badge.innerHTML = '● 采集中';
      document.getElementById('statusText').textContent = '运行中';
      document.getElementById('statusText').style.color = 'var(--accent2)';
    } else {
      badge.className = 'badge badge-off';
      badge.innerHTML = '● 离线';
      document.getElementById('statusText').textContent = '已停止';
      document.getElementById('statusText').style.color = 'var(--danger)';
    }

    document.getElementById('diskUsage').textContent = data.disk_usage || '--';
    document.getElementById('svgDiskUsage').textContent = 'SVG: ' + (data.svg_disk_usage || '--');
    document.getElementById('fileCount').textContent = data.file_count ?? '--';
    document.getElementById('dataDir').textContent = data.data_dir || '--';
    document.getElementById('statusSub').textContent = data.timestamp
      ? '更新于 ' + fmtDateTime(data.timestamp)
      : '';
  } catch (e) {
    console.error('Status load error:', e);
    document.getElementById('statusText').textContent = '不可用';
    document.getElementById('statusText').style.color = 'var(--text2)';
  }
}

// ===================== File Search =====================
let currentFiles = [];

async function searchFiles() {
  const activeQuick = document.querySelector('.quick-btn.active');
  let start, end;

  if (activeQuick) {
    const range = getRange(parseInt(activeQuick.dataset.range));
    start = range.start;
    end = range.end;
  } else {
    start = document.getElementById('startTime').value;
    end = document.getElementById('endTime').value || undefined;
    if (!start) { toast('请选择开始时间', 'error'); return; }
  }

  // update datetime inputs
  if (start) document.getElementById('startTime').value = start;
  if (end) document.getElementById('endTime').value = end;

  const listEl = document.getElementById('fileList');
  listEl.innerHTML = '<div style="padding:20px;text-align:center;"><span class="spinner"></span> 查询中...</div>';

  try {
    let url = `${API.files}?start=${encodeURIComponent(start)}`;
    if (end) url += `&end=${encodeURIComponent(end)}`;

    const res = await fetch(url);
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();

    if (data.error) { toast(data.error, 'error'); return; }

    currentFiles = data.files || [];
    renderFileList(currentFiles);

    document.getElementById('fileListCount').textContent = currentFiles.length + ' 个';
  } catch (e) {
    console.error('Search error:', e);
    listEl.innerHTML = '<div style="padding:20px;text-align:center;color:var(--danger);">查询失败</div>';
    toast('查询失败: ' + e.message, 'error');
  }
}

function renderFileList(files) {
  const listEl = document.getElementById('fileList');
  if (!files.length) {
    listEl.innerHTML = '<div style="padding:40px 20px;text-align:center;color:var(--text2);">无匹配文件</div>';
    return;
  }

  let html = '';
  files.forEach((f, i) => {
    const name = typeof f === 'string' ? f.split('/').pop() : f.name;
    const size = typeof f === 'object' ? f.size_bytes : undefined;
    html += `
      <div class="file-item" data-index="${i}" onclick="selectFile(${i})">
        <span class="file-name">${escapeHtml(name)}</span>
        <span class="file-size">${fmtSize(size)}</span>
      </div>`;
  });
  listEl.innerHTML = html;
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

// ===================== File Selection & Flamegraph =====================
let selectedIndex = -1;

function selectFile(index) {
  selectedIndex = index;

  // highlight
  document.querySelectorAll('.file-item').forEach(el => el.classList.remove('active'));
  const item = document.querySelector(`.file-item[data-index="${index}"]`);
  if (item) item.classList.add('active');

  // load flamegraph
  loadFlamegraph(currentFiles[index]);
}

async function loadFlamegraph(file) {
  const panel = document.getElementById('flamePanel');
  panel.innerHTML = '<div class="placeholder"><span class="spinner" style="width:32px;height:32px;"></span><div style="margin-top:16px;">生成火焰图中...</div></div>';

  const filePath = typeof file === 'string' ? file : file.path;
  const fileName = typeof file === 'string' ? file.split('/').pop() : file.name;

  try {
    const url = `${API.flame}?file=${encodeURIComponent(filePath)}&width=1200`;
    const res = await fetch(url);

    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      throw new Error(err.error || err.detail || 'HTTP ' + res.status);
    }

    const svgText = await res.text();
    panel.innerHTML = `<div class="flame-container">${svgText}</div>`;

    // re-bind SVG interaction: zoom on click
    setTimeout(() => {
      const svg = panel.querySelector('svg');
      if (svg) {
        svg.style.width = '100%';
        svg.style.height = 'auto';
        svg.style.cursor = 'pointer';
        // simple zoom toggle on click
        let zoomed = false;
        svg.addEventListener('click', function(e) {
          if (e.target === svg || e.target.tagName === 'svg') return; // ignore background clicks
          if (zoomed) {
            svg.style.width = '100%';
            svg.style.height = 'auto';
          } else {
            svg.style.width = '';
            svg.style.height = '';
          }
          zoomed = !zoomed;
        });
      }
    }, 100);

    toast(`火焰图已生成: ${escapeHtml(fileName)}`);
  } catch (e) {
    console.error('Flamegraph error:', e);
    panel.innerHTML = `<div class="placeholder" style="color:var(--danger);">生成失败<br><small>${escapeHtml(e.message)}</small></div>`;
    toast('火焰图生成失败: ' + e.message, 'error');
  }
}

// ===================== Quick Time Buttons =====================
document.querySelectorAll('.quick-btn').forEach(btn => {
  btn.addEventListener('click', function() {
    document.querySelectorAll('.quick-btn').forEach(b => b.classList.remove('active'));
    this.classList.add('active');
    // clear custom inputs
    document.getElementById('startTime').value = '';
    document.getElementById('endTime').value = '';
    searchFiles();
  });
});

// Override searchBtn to clear quick-btn active when custom time is used
document.getElementById('searchBtn').addEventListener('click', function() {
  const startVal = document.getElementById('startTime').value;
  if (startVal) {
    document.querySelectorAll('.quick-btn').forEach(b => b.classList.remove('active'));
  }
  searchFiles();
});

// ===================== Init =====================
function init() {
  loadStatus();
  // auto-search with default range (24h)
  searchFiles();
  // refresh status every 30s
  setInterval(loadStatus, 30000);
}

document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
